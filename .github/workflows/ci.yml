name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun install --cwd nelthor.qzz.io
      - run: bun run types:check
      - run: bun run lint:check
      - run: bun run format:check
      - run: bun run health:check

  build-portfolio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nelthor.qzz.io
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
