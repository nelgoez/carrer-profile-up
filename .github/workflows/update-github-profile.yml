name: Update GitHub Profile README

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: nelgoez/nelgoez
          token: ${{ secrets.GH_PAT }}
          path: profile

      - uses: actions/checkout@v4
        with:
          repository: nelgoez/career-profile-up
          token: ${{ secrets.GH_PAT }}
          path: career-profile-up

      - uses: oven-sh/setup-bun@v2

      - run: bun run career-profile-up/scripts/generate-readme.ts
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          N8N_API_URL: ${{ secrets.N8N_API_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

      - name: Copy generated README to profile repo
        run: cp career-profile-up/dist/profile/README.md profile/README.md

      - name: Check for changes
        id: diff
        working-directory: profile
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        working-directory: profile
        run: |
          git config user.name "profile-bot"
          git config user.email "bot@nelgoez.dev"
          git add README.md
          git commit -m "chore: auto-update profile README"
          git push
